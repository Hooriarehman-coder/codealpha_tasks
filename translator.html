<body>
  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTranslate AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-2xl">
        <h1 class="text-3xl font-bold text-slate-800 mb-6 text-center">Language Translator</h1>

        <div class="flex gap-4 mb-4">
            <select id="sourceLang" class="w-1/2 p-2 border rounded-lg bg-white">
                <option value="en-GB">English</option>
                <option value="es-ES">Spanish</option>
                <option value="fr-FR">French</option>
                <option value="de-DE">German</option>
            </select>
            <select id="targetLang" class="w-1/2 p-2 border rounded-lg bg-white">
                <option value="es-ES">Spanish</option>
                <option value="en-GB">English</option>
                <option value="fr-FR">French</option>
                <option value="it-IT">Italian</option>
            </select>
        </div>

        <div class="space-y-4">
            <textarea id="inputText" placeholder="Enter text here..." class="w-full h-32 p-4 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"></textarea>
            
            <div class="flex justify-center">
                <button id="translateBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-8 rounded-full transition-all transform active:scale-95">
                    Translate Text
                </button>
            </div>

            <div class="relative">
                <textarea id="outputText" placeholder="Translation will appear here..." readonly class="w-full h-32 p-4 border rounded-xl bg-slate-50 text-blue-800 font-medium"></textarea>
                
                <div class="absolute bottom-3 right-3 flex gap-2">
                    <button onclick="copyText()" class="p-2 hover:bg-gray-200 rounded-lg" title="Copy Text">📋</button>
                    <button onclick="speakText()" class="p-2 hover:bg-gray-200 rounded-lg" title="Listen">🔊</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const translateBtn = document.getElementById('translateBtn');
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const sourceLang = document.getElementById('sourceLang');
        const targetLang = document.getElementById('targetLang');

        translateBtn.addEventListener('click', async () => {
            const text = inputText.value;
            if (!text) return;

            translateBtn.innerText = "Translating...";
            
            try {
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang.value}|${targetLang.value}`);
                const data = await response.json();
                outputText.value = data.responseData.translatedText;
            } catch (error) {
                console.error("Translation Error:", error);
                outputText.value = "Error: Could not connect to the API.";
            } finally {
                translateBtn.innerText = "Translate Text";
            }
        });

        function copyText() {
            navigator.clipboard.writeText(outputText.value);
            alert("Copied to clipboard!");
        }

        function speakText() {
            const utterance = new SpeechSynthesisUtterance(outputText.value);
            utterance.lang = targetLang.value;
            speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
</body>
</html>
